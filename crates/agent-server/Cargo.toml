[package]
name = "agent-server"
version = "0.8.0"
edition.workspace = true
license-file = "../../LICENSE"
description = "Server-side agent orchestration built on narrow SDK crates"
publish = false

[dependencies]
agent-sdk-core = { workspace = true }
agent-sdk-tools = { workspace = true }
agent-sdk-providers = { workspace = true }
tokio = { workspace = true }
tokio-util = { workspace = true }
async-trait = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
anyhow = { workspace = true }
thiserror = { workspace = true }
time = { workspace = true }
uuid = { workspace = true }
log = { workspace = true }

[features]
# Exposes in-crate test doubles (e.g. `CapturingThreadEventsWatchHandler`)
# to downstream `[dev-dependencies]`.  Never enable on a release build.
test-support = []

[dev-dependencies]
tokio = { workspace = true, features = ["rt-multi-thread", "macros"] }

[lints]
workspace = true
