syntax = "proto3";

package agent.service.v1;

import "agent/service/v1/common.proto";
import "google/protobuf/duration.proto";
import "google/protobuf/struct.proto";
import "google/protobuf/timestamp.proto";

// Replay and live-tail event transport for a single thread.
//
// This surface is replay-first: every `event` item is a committed event with a
// server-owned sequence, and `after_sequence` is the only resume token. There
// is no hidden per-connection cursor state.

enum FollowMode {
  FOLLOW_MODE_UNSPECIFIED = 0;
  FOLLOW_MODE_REPLAY_ONLY = 1;
  FOLLOW_MODE_REPLAY_AND_FOLLOW = 2;
}

enum ReplayRequiredReason {
  REPLAY_REQUIRED_REASON_UNSPECIFIED = 0;
  REPLAY_REQUIRED_REASON_SUBSCRIBER_LAGGED = 1;
}

enum StreamCloseReason {
  STREAM_CLOSE_REASON_UNSPECIFIED = 0;
  STREAM_CLOSE_REASON_REPLAY_EXHAUSTED = 1;
  STREAM_CLOSE_REASON_THREAD_COMPLETED = 2;
  STREAM_CLOSE_REASON_SERVER_SHUTDOWN = 3;
  // The followed work reached a terminal `cancelled` event; the stream
  // closes so followers do not wait for a `done` that will never come.
  STREAM_CLOSE_REASON_TURN_CANCELLED = 4;
}

// A thread aggregate became durably visible. `source_thread_id` and
// `fork_after_committed_turns` are present only for `ForkThread`.
message ThreadCreatedEvent {
  string thread_id = 1;
  optional string source_thread_id = 2;
  optional uint32 fork_after_committed_turns = 3;
}

// Opens a turn. `turn` is the slot number the worker BOOTSTRAPPED
// with, committed before streaming begins — and in one rare race it is
// not the slot the turn finally lands on: a successor turn that loses
// its bootstrapped slot to a cancelled predecessor's salvage commit
// shifts forward, so its journal reads
// `start{turn: N} … turn_complete{turn: N+1} / done{total_turns: N+1}`.
// Derive turn boundaries from event ORDER (`start` … terminal frame),
// never by pairing `start.turn` against `turn_complete.turn` /
// `done.total_turns`; the completion-side indices are authoritative
// (they always match the thread's committed turn count and the
// checkpoint numbering). `user_input` pairs with its `start` by
// adjacency (committed immediately before it), not by turn index.
message StartEvent {
  string thread_id = 1;
  uint64 turn = 2;
  // Durable id of the task whose execution committed this event.
  // Unset on events journaled before the field existed and on
  // embedded (non-server) runs. Attribution is always the emitter's
  // own identity: a cancelled root's late salvage commit still names
  // that root, so a reader can tell a superseded frame apart from the
  // thread's live one.
  optional string emitter_task_id = 3;
}

// The user prompt that opens a turn. Committed by the worker on
// the first attempt of each root-turn task, immediately before
// the matching `StartEvent`. Carries the admitted prompt as a
// list of conversation content blocks (text, image, document)
// so replay clients can render the user message without
// re-deriving it from the projection's user-role messages —
// the projection mixes prompts with tool-result responses and
// compaction summaries, none of which carry a sequence number.
message UserInputEvent {
  string thread_id = 1;
  // Lifted from the task's admitted `submitted_input`. Reuses
  // the common `ConversationContentBlock` shape so wire types
  // stay consistent with the projection snapshot.
  repeated ConversationContentBlock content = 2;
}

message ThinkingEvent {
  string message_id = 1;
  string text = 2;
}

message ThinkingDeltaEvent {
  string message_id = 1;
  string delta = 2;
}

message TextDeltaEvent {
  string message_id = 1;
  string delta = 2;
}

message TextEvent {
  string message_id = 1;
  string text = 2;
}

message ToolCallStartEvent {
  string tool_call_id = 1;
  string name = 2;
  string display_name = 3;
  google.protobuf.Value input = 4;
  ToolTier tier = 5;
}

message ToolCallEndEvent {
  string tool_call_id = 1;
  string name = 2;
  string display_name = 3;
  ToolResult result = 4;
}

message ToolProgressEvent {
  string tool_call_id = 1;
  string name = 2;
  string display_name = 3;
  string stage = 4;
  string message = 5;
  google.protobuf.Value data = 6;
}

message ToolRequiresConfirmationEvent {
  string tool_call_id = 1;
  string name = 2;
  string display_name = 3;
  google.protobuf.Value input = 4;
  string description = 5;
}

// `turn` is the slot the turn actually COMMITTED on — after a
// slot-shifted commit (see `StartEvent`) it can be one higher than the
// preceding `start.turn`. A shifted successor's durable message
// history also splices the cancelled predecessor's salvaged prefix
// (its partial transcript, committed as the prior turn) before the
// successor's own messages; the next turn's bootstrap reads the full
// projection, so the history self-heals from then on.
message TurnCompleteEvent {
  uint64 turn = 1;
  TokenUsage usage = 2;
  // Durable id of the task whose execution committed this event.
  // Unset on events journaled before the field existed and on
  // embedded (non-server) runs. Attribution is always the emitter's
  // own identity: a cancelled root's late salvage commit still names
  // that root, so a reader can tell a superseded frame apart from the
  // thread's live one.
  optional string emitter_task_id = 3;
}

// Why the run reached its terminal `done` frame. Older servers never set
// this field, so UNSPECIFIED must be read as "normal completion".
enum RunStopReason {
  RUN_STOP_REASON_UNSPECIFIED = 0;
  RUN_STOP_REASON_COMPLETED = 1;
  RUN_STOP_REASON_BUDGET_TOTAL_TOKENS = 2;
  RUN_STOP_REASON_BUDGET_COST_USD = 3;
}

message DoneEvent {
  string thread_id = 1;
  uint64 total_turns = 2;
  TokenUsage total_usage = 3;
  // Wall-clock run duration. Always set: both normal completion and a
  // budget-limited stop report the run's elapsed time. May be unset only
  // on frames from servers that predate this guarantee.
  google.protobuf.Duration duration = 4;
  // Terminal disposition; distinguishes a budget-stopped run from normal
  // completion. Unset on frames from servers that predate this field.
  RunStopReason stop_reason = 5;
  // Estimated run cost in USD, when the provider/model has pricing
  // metadata.
  optional double estimated_cost_usd = 6;
  // Durable id of the task whose execution committed this event.
  // Unset on events journaled before the field existed and on
  // embedded (non-server) runs. Attribution is always the emitter's
  // own identity: a cancelled root's late salvage commit still names
  // that root, so a reader can tell a superseded frame apart from the
  // thread's live one.
  optional string emitter_task_id = 7;
}

// Why a durable task reached a terminal state.
//
// Recorded on the task row inside the terminal transition itself, so the
// reason and the status can never disagree, and republished here for
// clients that surface "why did this stop" without reading the journal.
//
// Every terminal transition carries one. A reader that needs to
// distinguish "the run was cancelled" from "the provider gave up" reads
// `kind`; anything needing the provider's own failure class reads
// `provider_error_kind`.
message TerminalReason {
  enum Kind {
    // The producer set no reason. Only appears on frames from servers
    // that predate this message; a current server always sets a
    // specific kind. Distinct from KIND_UNKNOWN — see below.
    KIND_UNSPECIFIED = 0;
    // The task finished its work successfully.
    KIND_COMPLETED = 1;
    // A caller explicitly cancelled this task tree.
    KIND_USER_CANCEL = 2;
    // A configured turn, token, cost, or retry budget was exhausted.
    KIND_BUDGET = 3;
    // The subagent watchdog observed no evidence of work for the full
    // stall budget. Measures silence, not age: a slow-but-working task
    // is never terminated by this.
    KIND_WATCHDOG_STALL = 4;
    // The provider failed the request. `provider_error_kind` names the
    // failure class; this is the only kind that populates it.
    KIND_PROVIDER_ERROR = 5;
    // An ancestor was cancelled, so this descendant was cancelled with
    // it. Distinct from KIND_USER_CANCEL, which names the task the
    // caller actually targeted.
    KIND_PARENT_CANCELLED = 6;
    // A pending confirmation was rejected, revoked, or timed out.
    KIND_CONFIRMATION_REJECTED = 7;
    // An internal execution or persistence fault ended the task — a
    // store rejection, a serialization failure. Not a provider failure:
    // if this shows up where a provider error is expected, the
    // classification path lost the typed cause.
    KIND_INTERNAL_ERROR = 8;
    // A NEWER server sent a reason this client's schema does not have.
    // The producer did name a reason (unlike KIND_UNSPECIFIED, where
    // none was sent) — this client simply cannot decode it. Treat as
    // "terminal, cause unknown to me" and prefer the free-text error
    // message.
    KIND_UNKNOWN = 9;
  }

  Kind kind = 1;
  // Provider failure class, in stable snake_case: `connectivity`,
  // `connection_lost`, `rate_limited`, `server_error`,
  // `invalid_request`, `unknown`. Set if and only if `kind` is
  // KIND_PROVIDER_ERROR. Safe to use as a metrics grouping key — it is
  // a closed vocabulary that carries no per-request detail (a
  // rate-limit's retry-after hint is deliberately not folded in).
  optional string provider_error_kind = 2;
}

message ErrorEvent {
  string message = 1;
  bool recoverable = 2;
  // Durable id of the task whose execution committed this event.
  // Unset on events journaled before the field existed and on
  // embedded (non-server) runs. Attribution is always the emitter's
  // own identity: a cancelled root's late salvage commit still names
  // that root, so a reader can tell a superseded frame apart from the
  // thread's live one.
  optional string emitter_task_id = 3;
  optional TerminalReason reason = 4;
}

// A root task (queued, parked, or running) was cancelled via the
// durable cancellation tree (`CancelTask`).
//
// Terminal for the cancelled work: streams treat it like `done` and
// close with `STREAM_CLOSE_REASON_TURN_CANCELLED`, so followers never
// hang waiting for a `done` that will not come. Committed INSIDE the
// cancellation transaction, exactly once per effective cancel of a
// root that occupied its thread's active-root slot — including
// child-thread roots cancelled through a subagent cascade, each on
// their own thread — together with a `thread_events_available` outbox
// advisory so cross-host followers are woken through the relay. A
// crash cannot separate the marker from the cancellation it reports.
// Cancelling a QUEUED root behind a live active root emits no marker
// (the active root's stream continues; observe the queued cancel via
// `GetTask` / `cancelled_task_ids`). Idempotent cancel retries emit
// nothing, and a running worker's later abort commits salvaged content
// but no second lifecycle marker.
//
// One marker per effective cancel, on every backend: the durable ones
// commit the marker set inside the cancellation transaction, and the
// embedded in-memory backend journals the set before applying any
// transition and reuses — never rewrites — a marker already on the
// thread. A reused marker keeps the `turn` and `usage` computed when it
// was FIRST journaled, so if the root committed a turn between a failed
// cancel attempt and its retry, the surviving marker understates both
// against the moment the cancel was finally honored. The embedded
// backend's one residual, since it cannot span its stores
// transactionally: a cancel whose marker write FAILS part-way through a
// subagent cascade, and which the caller then abandons rather than
// retries, leaves a marker on a root that was not cancelled and keeps
// running. A follower closes on it and reaches that task's real answer
// by reconnecting. In every one of these cases the task's own row
// (`GetTask`) is the authority on whether — and how — it ended.
//
// Post-terminal salvage: a RUNNING root's worker may keep appending
// streaming deltas for up to one heartbeat after this marker — they
// land at sequences strictly after it. Followers that closed on the
// marker miss only that salvage; a replay cursor positioned past the
// marker may observe the trailing deltas with no further lifecycle
// close. Treat this marker as the authoritative end of the cancelled
// turn.
//
// `turn` is the thread's committed turn count when the cancel was
// honored. `usage` is the cumulative usage accumulated on the thread
// so far (mirroring `done`'s total-usage semantics): derived from the
// parked turn's durable continuation when one exists (it includes the
// suspended turn's already-billed calls), otherwise the thread's
// committed aggregate; zero only for a thread that never ran. A
// RUNNING turn's in-flight usage is with its worker and is not
// included here — it lands on the turn-attempt audit rows.
message CancelledEvent {
  uint64 turn = 1;
  TokenUsage usage = 2;
  // Durable id of the task whose execution committed this event.
  // Unset on events journaled before the field existed and on
  // embedded (non-server) runs. Attribution is always the emitter's
  // own identity: a cancelled root's late salvage commit still names
  // that root, so a reader can tell a superseded frame apart from the
  // thread's live one.
  optional string emitter_task_id = 3;
  optional TerminalReason reason = 4;
}

message RefusalEvent {
  string message_id = 1;
  optional string text = 2;
}

message ContextCompactedEvent {
  uint64 original_count = 1;
  uint64 new_count = 2;
  uint64 original_tokens = 3;
  uint64 new_tokens = 4;
}

message SubagentProgressEvent {
  string subagent_id = 1;
  string subagent_name = 2;
  optional string nickname = 3;
  optional uint32 max_turns = 4;
  optional uint32 current_turn = 5;
  optional string model = 6;
  string tool_name = 7;
  string tool_context = 8;
  bool completed = 9;
  bool success = 10;
  uint32 tool_count = 11;
  uint64 total_tokens = 12;
  optional string child_thread_id = 13;
  optional string child_root_task_id = 14;
  optional string subagent_task_id = 15;
  uint64 input_tokens = 16;
  uint64 output_tokens = 17;
  uint64 cache_read_input_tokens = 18;
  uint64 cache_creation_input_tokens = 19;
}

// Auto-retry was initiated for a transient LLM error (rate limit,
// 5xx server error). Consumers can render a "Retrying X/N in
// Yms…" indicator and clear it on the matching `auto_retry_end`.
message AutoRetryStartEvent {
  // 1-based retry attempt (first retry = 1).
  uint32 attempt = 1;
  // Maximum retry attempts configured for this run.
  uint32 max_attempts = 2;
  // Backoff before the next attempt in milliseconds.
  uint64 delay_ms = 3;
  // Human-readable reason the retry was triggered.
  string error_message = 4;
}

// Auto-retry settled. `success = true` means a follow-up attempt
// succeeded; `success = false` means the retry budget was
// exhausted and `final_error` carries the last error.
message AutoRetryEndEvent {
  // Total attempts performed (matches the last `auto_retry_start`'s
  // `attempt`).
  uint32 attempt = 1;
  // Whether a follow-up attempt eventually succeeded.
  bool success = 2;
  // Last error when the retry budget ran out. Empty when success.
  optional string final_error = 3;
}

// A single committed event in per-thread sequence order.
message EventEnvelope {
  string event_id = 1;
  string thread_id = 2;
  uint64 sequence = 3;
  google.protobuf.Timestamp commit_time = 4;

  oneof event {
    StartEvent start = 10;
    ThinkingEvent thinking = 11;
    ThinkingDeltaEvent thinking_delta = 12;
    TextDeltaEvent text_delta = 13;
    TextEvent text = 14;
    ToolCallStartEvent tool_call_start = 15;
    ToolCallEndEvent tool_call_end = 16;
    ToolProgressEvent tool_progress = 17;
    ToolRequiresConfirmationEvent tool_requires_confirmation = 18;
    TurnCompleteEvent turn_complete = 19;
    DoneEvent done = 20;
    ErrorEvent error = 21;
    RefusalEvent refusal = 22;
    ContextCompactedEvent context_compacted = 23;
    SubagentProgressEvent subagent_progress = 24;
    AutoRetryStartEvent auto_retry_start = 25;
    AutoRetryEndEvent auto_retry_end = 26;
    UserInputEvent user_input = 27;
    CancelledEvent cancelled = 28;
    ThreadCreatedEvent thread_created = 29;
  }
}

message StreamThreadEventsRequest {
  string thread_id = 1;

  // Exclusive replay cursor. Omit to replay from the beginning of the
  // retained event log.
  optional uint64 after_sequence = 2;

  // Replay only, or replay and then continue with committed live events.
  // FOLLOW_MODE_UNSPECIFIED is treated as INVALID_ARGUMENT.
  FollowMode follow_mode = 3;
}

// First frame on every successful stream.
//
// This does not participate in event ordering: it announces the replay window
// the server will use for the immediately-following `event` frames.
message ReplayOpened {
  string thread_id = 1;
  optional uint64 requested_after_sequence = 2;
  optional uint64 earliest_available_sequence = 3;
  optional uint64 replay_through_sequence = 4;
  FollowMode follow_mode = 5;
}

// Marks the handoff point between durable replay and live follow.
//
// Exactly one `replay_catchup_complete` frame is emitted after a successful
// replay window, unless the stream terminated earlier with `retention_gap`.
message ReplayCatchupComplete {
  string thread_id = 1;
  optional uint64 replayed_through_sequence = 2;
  bool following_live = 3;
}

// Terminal control frame emitted when the requested cursor predates the
// retained event window.
//
// After emitting this frame the server closes the RPC normally. Clients should
// rehydrate from unary snapshots (`GetThread`, `GetThreadMessages`,
// `ListThreadTasks`) before opening a new stream.
message RetentionGap {
  string thread_id = 1;
  optional uint64 requested_after_sequence = 2;
  optional uint64 earliest_available_sequence = 3;
  optional uint64 latest_available_sequence = 4;
}

// Terminal control frame emitted after the server intentionally drops live
// follow and requires the client to reconnect via replay.
message ReplayRequired {
  string thread_id = 1;
  optional uint64 last_delivered_sequence = 2;
  ReplayRequiredReason reason = 3;
}

// Terminal control frame emitted when the server cleanly ends a stream.
message EventStreamClosed {
  string thread_id = 1;
  StreamCloseReason reason = 2;
  optional uint64 last_sequence = 3;
}

// Streaming response envelope.
//
// Ordering rule:
// - Only `event` frames are sequence-ordered.
// - Control frames (`replay_opened`, `replay_catchup_complete`,
//   `retention_gap`, `replay_required`, `closed`) never imply a committed
//   event sequence of their own.
message StreamThreadEventsResponse {
  oneof item {
    ReplayOpened replay_opened = 1;
    EventEnvelope event = 2;
    ReplayCatchupComplete replay_catchup_complete = 3;
    RetentionGap retention_gap = 4;
    ReplayRequired replay_required = 5;
    EventStreamClosed closed = 6;
  }
}

service AgentEventService {
  // Replay committed events after `after_sequence`, optionally followed by the
  // live committed tail for the same thread.
  //
  // Successful stream shape:
  // 1. `replay_opened`
  // 2. zero or more `event` frames in strictly increasing `sequence` order
  // 3. `replay_catchup_complete`
  // 4. if `follow_mode == FOLLOW_MODE_REPLAY_ONLY`, `closed` with
  //    `STREAM_CLOSE_REASON_REPLAY_EXHAUSTED` then EOF
  // 5. otherwise zero or more live `event` frames until `replay_required`,
  //    `closed`, transport error, or client cancellation
  rpc StreamThreadEvents(StreamThreadEventsRequest) returns (stream StreamThreadEventsResponse);
}
