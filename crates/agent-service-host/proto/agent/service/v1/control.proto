syntax = "proto3";

package agent.service.v1;

import "agent/service/v1/common.proto";

// Unary control and inspection surface for threads, tasks, committed
// transcript snapshots, and durable confirmations.
//
// Design rule: these RPCs return current committed snapshots. The only
// replayable stream in the contract is `AgentEventService.StreamThreadEvents`.

message CreateThreadRequest {
  // Caller-supplied idempotency key for the logical create operation.
  // Retries must reuse the same value.
  string request_id = 1;
}

message CreateThreadResponse {
  ThreadView thread = 1;
}

message GetThreadRequest {
  string thread_id = 1;
}

message GetThreadResponse {
  ThreadView thread = 1;
}

message GetThreadMessagesRequest {
  string thread_id = 1;
}

message GetThreadMessagesResponse {
  MessageProjectionSnapshot projection = 1;
}

message ListThreadTasksRequest {
  string thread_id = 1;
}

message ListThreadTasksResponse {
  repeated TaskSnapshot tasks = 1;
}

message GetTaskRequest {
  string task_id = 1;
}

message GetTaskResponse {
  TaskSnapshot task = 1;
}

message SubmitThreadWorkRequest {
  // Caller-supplied idempotency key for the logical submission.
  string request_id = 1;

  // Existing thread to append work to. Thread creation is explicit via
  // `CreateThread` so the replay and inspection surfaces never depend on
  // implicit server-side thread bootstrapping.
  string thread_id = 2;

  // Client input for the next root-turn submission. At least one item must be
  // supplied.
  repeated UserInputItem input = 3;
}

message SubmitThreadWorkResponse {
  // Thread snapshot after admission.
  ThreadView thread = 1;

  // The admitted root-turn task. The task is `pending` when the thread had no
  // blocking root, or `queued` when it was accepted behind existing work.
  TaskSnapshot task = 2;
}

// Fork an existing thread into a new thread that inherits the
// source's durable conversation state up to a caller-chosen turn
// boundary.
//
// # The fork point
//
// Forks always cut on a completed-turn boundary. The caller picks
// which boundary via `fork_after_committed_turns`: the new thread
// has exactly the first N committed turns, and everything after
// (including the in-flight or future turns of the source) is
// discarded. This matches the typical "branch from this user
// message" UX — the desktop computes
// `fork_after_committed_turns = (selected_user_message_index / 2)`
// for text-only conversations (and the equivalent turn index for
// tool-using conversations), which lands the new thread *just
// before* the chosen user prompt so the user can edit/resend.
//
// The boundary alignment is what makes the fork addressable across
// every durable surface: the per-turn checkpoint, the message
// projection (whose `commit_messages` is the per-turn append), and
// the event log (whose `Done` event marks the per-turn close) are
// all already keyed off `committed_turns`. Mid-turn fork points
// would force partial-checkpoint semantics that don't exist
// anywhere else in the SDK.
//
// # What gets copied
//
// * The new thread's `agent_sdk_message_heads` row is seeded from
//   the source's checkpoint at the fork-point turn (or `replace_history`
//   with empty messages when forking at turn 0).
// * The source's checkpoint at the fork-point turn is mirrored onto
//   the new thread (with `agent_state_snapshot.thread_id` rewritten
//   to the new id — see the snapshot-rewrite contract in the
//   handler) so `recover_thread` reaches the projection-driven
//   branch on the next submit.
// * Every event the source committed *through* the `Done` event for
//   the fork-point turn is re-committed against the new thread under
//   fresh, monotonically increasing sequence numbers. This makes
//   `StreamThreadEvents(new_thread_id, after_sequence: 0)` replay
//   the prior conversation natively — no per-host mirror required.
// * Events emitted on the source after the fork point (live tail of
//   an in-flight turn, future turns) are *not* copied.
//
// # Idempotency
//
// `request_id` is the idempotency key. A retry under the same
// request_id returns the originally-minted thread; a retry with a
// *different* `source_thread_id` or `fork_after_committed_turns`
// under the same `request_id` is rejected with `ALREADY_EXISTS`.
//
// # Errors
//
// * `NOT_FOUND` if `source_thread_id` doesn't resolve to a known
//   thread.
// * `INVALID_ARGUMENT` if `fork_after_committed_turns` exceeds the
//   source's `committed_turns`, or for blank `request_id` /
//   `source_thread_id`.
// * `FAILED_PRECONDITION` if the source is in a state that can't be
//   forked (e.g. a future "completed and archived" state).
message ForkThreadRequest {
  // Caller-supplied idempotency key for the logical fork operation.
  string request_id = 1;

  // Existing thread to copy committed conversation state from.
  string source_thread_id = 2;

  // How many of the source's *completed* turns to carry over. Must
  // be `<= source.committed_turns`. `0` produces an empty fork (no
  // messages, no events, no checkpoint — same shape as a freshly
  // `CreateThread`'d thread); `source.committed_turns` produces a
  // full fork that mirrors the entire conversation.
  uint32 fork_after_committed_turns = 3;
}

message ForkThreadResponse {
  // Snapshot of the freshly-minted thread.
  ThreadView thread = 1;

  // Source thread the fork was derived from (echoed for client
  // bookkeeping; the server already has it in the request).
  string source_thread_id = 2;

  // Number of messages copied from the source's checkpoint at the
  // fork-point turn into the new thread.
  uint64 message_count = 3;

  // Number of events re-committed against the new thread. Equal to
  // the highest source sequence whose committed turn is `<=
  // fork_after_committed_turns`.
  uint64 event_count = 4;

  // The fork-point turn echoed back. Useful for clients that want
  // to verify the boundary the server actually cut at when
  // diagnosing UI/SDK skew.
  uint32 fork_after_committed_turns = 5;
}

// Atomicity (durable backends): the fork-state copy is wrapped in
// one transaction via `ThreadStore::atomic_fork_committer`. A crash
// or transport failure mid-fork leaves the destination thread in
// the not-created state — never partially-built. Backends without
// the hook (in-memory) fall back to sequential writes; their
// per-store mutations are already serialized under independent
// write locks, so partial state is observable in-process but not
// across restarts (in-memory state evaporates on restart anyway).

message DecideConfirmationRequest {
  // Caller-supplied idempotency key for the logical confirmation decision.
  string request_id = 1;

  // Thread guard. The server must reject mismatched `(thread_id, task_id)`
  // pairs rather than silently applying the decision to some other thread's
  // paused task.
  string thread_id = 2;
  string task_id = 3;
  ConfirmationDecision decision = 4;
}

message DecideConfirmationResponse {
  // Updated child task after the decision was durably applied.
  TaskSnapshot task = 1;

  // Parent task snapshot when the decision path also changed the parent's
  // durable state (for example, a rejected confirmation failing the child and
  // rebalancing the waiting parent).
  TaskSnapshot parent_task = 2;
}

service AgentControlService {
  // Allocate a new active thread and return its committed snapshot.
  rpc CreateThread(CreateThreadRequest) returns (CreateThreadResponse);

  // Inspect the current committed thread projection plus any active or queued
  // root tasks for that thread.
  rpc GetThread(GetThreadRequest) returns (GetThreadResponse);

  // Return the current committed message projection for the thread.
  //
  // This is the recovery path after an event-stream retention gap: clients use
  // the transcript snapshot to rebuild UI state, then reopen the event stream
  // from a fresh cursor derived from `GetThread`.
  rpc GetThreadMessages(GetThreadMessagesRequest) returns (GetThreadMessagesResponse);

  // List every durable task row bound to the thread.
  rpc ListThreadTasks(ListThreadTasksRequest) returns (ListThreadTasksResponse);

  // Inspect one durable task row by id.
  rpc GetTask(GetTaskRequest) returns (GetTaskResponse);

  // Submit the next unit of client work to an existing thread.
  rpc SubmitThreadWork(SubmitThreadWorkRequest) returns (SubmitThreadWorkResponse);

  // Fork an existing thread into a new thread carrying the same
  // committed conversation state (messages + events + latest
  // checkpoint). The new thread diverges from the source on the next
  // submission.
  rpc ForkThread(ForkThreadRequest) returns (ForkThreadResponse);

  // Apply a durable confirmation decision to an awaiting task.
  rpc DecideConfirmation(DecideConfirmationRequest) returns (DecideConfirmationResponse);
}
