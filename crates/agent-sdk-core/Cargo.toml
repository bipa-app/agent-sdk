uuid = { workspace = true }

[dev-dependencies]
tokio = { workspace = true, features = ["rt-multi-thread", "macros"] }
proptest = { workspace = true }
proptest-state-machine = { workspace = true }
insta = { workspace = true }

[lints]
workspace = true
