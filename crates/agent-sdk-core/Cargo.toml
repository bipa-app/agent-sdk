[package]
name = "agent-sdk-core"
version = "0.9.0"
edition.workspace = true
license.workspace = true
rust-version.workspace = true
repository.workspace = true
homepage.workspace = true
authors.workspace = true
description = "Shared contract types for the Agent SDK (IDs, events, LLM messages, turn outcomes)"
keywords = ["agent", "llm", "ai", "types"]
