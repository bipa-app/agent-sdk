services:
  postgres18:
    image: postgres:18
    environment:
      POSTGRES_DB: agent_sdk
      POSTGRES_USER: agent_sdk
      POSTGRES_PASSWORD: agent_sdk
    ports:
      - "55432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 2s
      timeout: 5s
      retries: 30
    volumes:
      - postgres18-data:/var/lib/postgresql

volumes:
  postgres18-data:
