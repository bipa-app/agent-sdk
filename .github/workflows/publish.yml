name: Private Distribution Guard

on:
  push:
    branches: [main]
    paths:
      - 'crates/*/Cargo.toml'
      - 'Cargo.toml'
      - 'README.md'
      - 'LICENSE'
      - '.github/workflows/**'
  pull_request:
    branches: [main]
    paths:
      - 'crates/*/Cargo.toml'
      - 'Cargo.toml'
      - 'README.md'
      - 'LICENSE'
      - '.github/workflows/**'

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  private-guard:
    name: Verify Private Distribution Guardrails
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify Cargo metadata blocks publication
        run: |
          if grep -q '^license = "Apache-2.0"$' Cargo.toml; then
            echo 'workspace root still advertises Apache-2.0'
            exit 1
          fi
          if grep -q '^repository = "https://github.com/bipa-app/agent-sdk"$' Cargo.toml; then
            echo 'workspace root still advertises the public GitHub repository'
            exit 1
          fi
          for manifest in crates/*/Cargo.toml; do
            grep -q '^publish = false$' "$manifest"
            grep -q '^license-file = "../../LICENSE"$' "$manifest"
            if grep -q '^license\.workspace = true$' "$manifest"; then
              echo "$manifest still inherits open-source license metadata from the workspace"
              exit 1
            fi
            if grep -q '^repository\.workspace = true$' "$manifest"; then
              echo "$manifest still inherits repository metadata from the workspace"
              exit 1
            fi
            if grep -q '^license = "Apache-2.0"$' "$manifest"; then
              echo "$manifest still advertises Apache-2.0"
              exit 1
            fi
            if grep -q '^repository = "https://github.com/bipa-app/agent-sdk"$' "$manifest"; then
              echo "$manifest still advertises the public GitHub repository"
              exit 1
            fi
          done

      - name: Verify repository messaging is private-only
        run: |
          grep -q 'Private repository' README.md
          grep -q 'proprietary and confidential' README.md
          grep -q 'not open to public contributions' CONTRIBUTING.md
          grep -q 'All rights reserved.' LICENSE

      - name: Verify workflows contain no public publish automation
        run: |
          if grep -R -n -E 'cargo[[:space:]]+publish|CARGO_REGISTRY_TOKEN|gh[[:space:]]+release[[:space:]]+create' .github/workflows --exclude publish.yml; then
            echo 'found forbidden public release automation outside publish.yml'
            exit 1
          fi
