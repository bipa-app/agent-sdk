name: Private Distribution Guard

on:
  push:
    branches: [main]
    paths:
      - 'Cargo.toml'
      - 'README.md'
      - 'LICENSE'
      - '.github/workflows/**'
  pull_request:
    branches: [main]
    paths:
      - 'Cargo.toml'
      - 'README.md'
      - 'LICENSE'
      - '.github/workflows/**'

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  private-guard:
    name: Verify Private Distribution Guardrails
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify Cargo metadata blocks publication
        run: |
          grep -q '^license-file = "LICENSE"$' Cargo.toml
          grep -q '^publish = false$' Cargo.toml

      - name: Verify repository messaging is private-only
        run: |
          grep -q 'Private repository' README.md
          grep -q 'proprietary and confidential' README.md
          grep -q 'not open to public contributions' CONTRIBUTING.md

      - name: Verify workflows contain no public publish automation
        run: |
          if grep -R -n -E 'cargo[[:space:]]+publish|CARGO_REGISTRY_TOKEN|gh[[:space:]]+release[[:space:]]+create' .github/workflows --exclude publish.yml; then
            echo 'found forbidden public release automation outside publish.yml'
            exit 1
          fi
