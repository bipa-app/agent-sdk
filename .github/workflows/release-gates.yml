name: Release gates

# Supply-chain + release-readiness gates that run on every PR/push and
# nightly. These are the checks the crates.io publish (a later, human-gated
# step) depends on: a clean advisory DB, an allowed-license set, an MSRV that
# actually builds, and no accidental public-API breakage.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch: {}

env:
  CARGO_TERM_COLOR: always

jobs:
  # cargo-deny: licenses + advisories + bans + sources, per deny.toml.
  cargo-deny:
    name: cargo-deny (licenses + advisories + bans)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@cargo-deny
      - run: cargo deny check

  # cargo-audit: RustSec vulnerability scan against the committed Cargo.lock.
  cargo-audit:
    name: cargo-audit (RustSec)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@cargo-audit
      - run: cargo audit

  # cargo-semver-checks: diffs each publishable crate against its crates.io
  # baseline to surface API-breaking changes. This is ADVISORY
  # (continue-on-error), not a hard gate: release-plz owns versioning, so a
  # feature PR legitimately carries a breaking change WITHOUT bumping the
  # version in-PR — release-plz proposes the correct (minor, for 0.x) bump in
  # its release PR from the conventional-commit/`BREAKING CHANGE:` markers. A
  # blocking gate here would reject every breaking PR before release-plz can
  # bump it. The report still runs so reviewers see the break; the version
  # decision happens on the release PR. See ENG-8728 / the COOKBOOK release
  # section.
  semver-checks:
    name: cargo-semver-checks (public API, advisory)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@cargo-semver-checks
      # Only the publishable crates are checked; the internal server/host
      # crates carry no semver contract. ADVISORY: the report runs but never
      # fails the check — a feature PR legitimately carries a breaking change
      # without bumping the version (release-plz proposes the bump on its
      # release PR). On a break, we surface a GitHub ::warning:: annotation so
      # reviewers see it, but the check stays green and never blocks merge.
      - name: cargo-semver-checks (advisory; warns, never fails)
        run: |
          if ! cargo semver-checks check-release \
            --package agent-sdk-foundation \
            --package agent-sdk-tools \
            --package agent-sdk-providers \
            --package agent-sdk \
            --package agent-sdk-otel \
            --package agent-sdk-cli; then
            echo "::warning title=cargo-semver-checks::Public-API breaking change detected. This is advisory — confirm the release-plz version bump is a major/minor as appropriate (0.x breaking -> minor)."
          fi

  # MSRV: the published crates must build on the pinned minimum toolchain
  # declared in [workspace.package] rust-version. The internal
  # agent-service-host (sqlx ≥ 1.94) is intentionally excluded — it is not
  # published and carries no MSRV contract.
  msrv:
    name: MSRV (pinned toolchain ${{ matrix.rust }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        rust: ["1.91"]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}
      - uses: Swatinem/rust-cache@v2
      - name: Build publishable crates on MSRV
        run: >-
          cargo +${{ matrix.rust }} check --all-features
          --package agent-sdk-foundation
          --package agent-sdk-tools
          --package agent-sdk-providers
          --package agent-sdk
          --package agent-sdk-otel
          --package agent-sdk-cli

  # Packaging dry-run: proves every publishable crate produces a valid
  # `.crate` (manifest + included files). Leaf crates verify fully; dependent
  # crates use --no-verify because their dependencies are not on crates.io
  # until the (human-gated) ordered publish happens.
  package-dry-run:
    name: cargo package (dry-run)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Package leaf crates (full verify)
        run: |
          cargo package --package agent-sdk-foundation
          cargo package --package agent-sdk-macros
      - name: Validate dependent crate manifests pack
        run: |
          for crate in agent-sdk-tools agent-sdk-providers agent-sdk agent-sdk-otel agent-sdk-cli; do
            echo "::group::cargo package --list -p $crate"
            cargo package --list --package "$crate"
            echo "::endgroup::"
          done
