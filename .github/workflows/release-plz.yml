name: release-plz

# Two release flows, split by trigger so publishing is never automatic:
#
#  * push to `main`  → `release-pr` job: opens/updates the "release PR" that
#    bumps versions + updates CHANGELOGs from conventional commits. Merging it
#    is a human decision; this never publishes.
#  * manual dispatch → `release` job: runs `release-plz release`, which
#    publishes to crates.io in dependency order using CARGO_REGISTRY_TOKEN,
#    publishing only the crates whose manifest version is not yet on crates.io
#    (so the new sub-crates are created on first publish; `agent-sdk` bumps
#    from its existing 0.8.0). This is the HITL go-live: it runs ONLY when a
#    human triggers the workflow, never on push.
on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

# Never run two release flows concurrently.
concurrency:
  group: release-plz-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-pr:
    name: Open/update release PR
    runs-on: ubuntu-latest
    # Push only: opens/updates the release PR, never publishes. Skip on forks.
    if: github.repository == 'bipa-app/agent-sdk' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
      - name: Run release-plz (release-pr only)
        uses: release-plz/action@v0.5
        with:
          command: release-pr
        env:
          # A PAT (RELEASE_GITHUB_TOKEN), not the default GITHUB_TOKEN: GitHub
          # suppresses workflow runs for events created with GITHUB_TOKEN, so a
          # PR opened with it gets no CI. The PAT (Contents:RW + Pull
          # requests:RW) makes the release PR trigger ci.yml + release-gates.yml.
          GITHUB_TOKEN: ${{ secrets.RELEASE_GITHUB_TOKEN }}

  # HITL GO-LIVE. Runs ONLY on manual workflow_dispatch — never on push — so a
  # publish is always a deliberate human action. `release-plz release`
  # publishes the crates whose manifest version is not yet on crates.io, in
  # dependency order (agent-sdk-macros before agent-sdk, etc.), tags the
  # release, and skips anything already published. Trigger it after the
  # release PR (the version bump) has merged and the SDK is ready to ship.
  release:
    name: Publish to crates.io (manual)
    runs-on: ubuntu-latest
    # Branch guard: workflow_dispatch lets the operator pick ANY ref, so without
    # `github.ref == 'refs/heads/main'` a dispatch from a stale or feature
    # branch would run `release-plz release` against that branch's manifests and
    # publish unreviewed code to crates.io. Only ever publish from `main`.
    if: >-
      github.repository == 'bipa-app/agent-sdk'
      && github.event_name == 'workflow_dispatch'
      && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
      - name: Run release-plz (publish)
        uses: release-plz/action@v0.5
        with:
          command: release
        env:
          # Same PAT for the git tag + GitHub Release (Contents:RW). crates.io
          # upload uses the separate CARGO_REGISTRY_TOKEN.
          GITHUB_TOKEN: ${{ secrets.RELEASE_GITHUB_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
