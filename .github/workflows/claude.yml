name: Claude
on:
  issue_comment:
    types: [created]
jobs:
  claude-review:
    # Public-repo safety: only run (and only expose secrets) for trusted actors.
    # On a public repo anyone can comment, so gate on author_association before
    # the OAuth token is ever available to the job.
    if: |
      github.event.issue.pull_request &&
      contains(github.event.comment.body, '/review') &&
      (github.event.comment.author_association == 'OWNER' ||
       github.event.comment.author_association == 'MEMBER' ||
       github.event.comment.author_association == 'COLLABORATOR')
    runs-on: blacksmith-2vcpu-ubuntu-2404
    permissions:
      contents: read
      pull-requests: read
      issues: read
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          ref: refs/pull/${{ github.event.issue.number }}/head
      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          track_progress: true
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.issue.number }}
            USER QUERY: ${{ github.event.comment.body }}

            Please review this pull request and provide feedback on:
            - Code quality and best practices
            - Potential bugs or issues
            - Performance considerations
            - Security concerns
            - Test coverage

            Use the repository's CLAUDE.md for guidance on style and conventions. Be constructive and helpful in your feedback.

            Use `gh pr comment` with your Bash tool to leave your review as a comment on the PR.
          claude_args: '--allowed-tools "Bash(gh issue view:*),Bash(gh search:*),Bash(gh issue list:*),Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh pr list:*)"'
  claude-code:
    # Public-repo safety: this job has write perms + checks out the (untrusted)
    # PR head, so it must only run for trusted actors. Gate on author_association
    # before the OAuth token / write permissions are exposed.
    if: |
      github.event.issue.pull_request &&
      contains(github.event.comment.body, '@claude') &&
      !contains(github.event.comment.body, '/review') &&
      (github.event.comment.author_association == 'OWNER' ||
       github.event.comment.author_association == 'MEMBER' ||
       github.event.comment.author_association == 'COLLABORATOR')
    runs-on: blacksmith-2vcpu-ubuntu-2404
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      # Pwn-request guard: the author_association gate only vets the COMMENTER,
      # not the PR author. A trusted maintainer typing `@claude` on a fork PR
      # would otherwise make this write-scoped job check out and process
      # attacker-controlled diff/file content. Block any PR whose head is not in
      # this same repository BEFORE the untrusted code is ever checked out.
      # Uses the default read token; runs no PR code.
      - name: Restrict to same-repo PRs
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          head_repo=$(gh api \
            "repos/${{ github.repository }}/pulls/${{ github.event.issue.number }}" \
            --jq '.head.repo.full_name')
          echo "PR head repo: $head_repo"
          if [ "$head_repo" != "${{ github.repository }}" ]; then
            echo "::error::Refusing to run the write-scoped Claude job on a fork PR ($head_repo)."
            exit 1
          fi
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: refs/pull/${{ github.event.issue.number }}/head
          # Do not leave the write-scoped token in .git/config, so injected
          # instructions in the (now same-repo) diff cannot reuse ambient
          # credentials to push to base-repo branches via the Bash git tool.
          persist-credentials: false
      - name: Run Claude Code
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          track_progress: true
          additional_permissions: |
            actions: read
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.issue.number }}
            USER QUERY: ${{ github.event.comment.body }}

            IMPORTANT: Before committing any code changes, you MUST run `cargo fmt` to format the code.
          # Narrow git tooling to the specific subcommands needed to stage and
          # commit changes (no broad `Bash(git:*)`, which would also permit
          # `git remote`/`git config`/arbitrary push targets).
          claude_args: '--allowedTools "Bash(git add:*),Bash(git commit:*),Bash(git status:*),Bash(git diff:*),Bash(git log:*),Bash(git restore:*),Bash(cargo fmt:*),Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*)"'
