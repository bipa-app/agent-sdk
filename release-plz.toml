# release-plz configuration.
#
# release-plz automates the release flow for this workspace: it opens a
# "release PR" that bumps versions + updates changelogs from conventional
# commits, and (on merge, in a separate, human-gated workflow) publishes the
# crates to crates.io in dependency order.
#
# IMPORTANT: the actual crates.io publish + git tag are HITL. This config only
# drives the release-PR (version bump + changelog) on push; publishing runs in a
# separate, manually-dispatched `release` job in
# `.github/workflows/release-plz.yml` (guarded to `main`). Nothing here
# publishes on its own.

[workspace]
# A single PR/changelog for the whole SDK keeps the version line in lockstep
# across the published crates (they share one version — 0.9.2 as of this
# writing).
changelog_update = true
# Dependent crates get their intra-workspace dependency bumped when a
# dependency releases.
dependencies_update = true
# Verify each package builds before proposing a release.
publish_no_verify = false
# Conventional-commit-driven changelog.
git_release_enable = true
# Do NOT auto-publish; the publish step is gated to a manual/HITL workflow.
publish = false

# ── Publishable crates ────────────────────────────────────────────────
# These are the only crates release-plz manages. They all share
# `version_group = "agent-sdk"`, so release-plz assigns every one of them the
# SAME version — the highest next version across the group. This keeps the
# published SDK on a single version line: the whole group is on 0.9.x today and
# bumps together (e.g. all crates went 0.9.1 → 0.9.2 in one PR).

[[package]]
name = "agent-sdk-foundation"
publish = true
version_group = "agent-sdk"

[[package]]
name = "agent-sdk-tools"
publish = true
version_group = "agent-sdk"

# Proc-macro crate. `agent-sdk` depends on it, so it must publish (in
# dependency order, before `agent-sdk`).
[[package]]
name = "agent-sdk-macros"
publish = true
version_group = "agent-sdk"

[[package]]
name = "agent-sdk-providers"
publish = true
version_group = "agent-sdk"

[[package]]
name = "agent-sdk"
publish = true
version_group = "agent-sdk"

[[package]]
name = "agent-sdk-otel"
publish = true
version_group = "agent-sdk"

[[package]]
name = "agent-sdk-cli"
publish = true
version_group = "agent-sdk"

# ── Internal crates — never released ──────────────────────────────────
# Mirrors `publish = false` in their manifests; release-plz also skips them.

[[package]]
name = "agent-server"
release = false

[[package]]
name = "agent-server-loom"
release = false

[[package]]
name = "agent-service-host"
release = false
