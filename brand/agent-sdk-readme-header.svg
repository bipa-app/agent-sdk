<!-- agent-sdk README / repo banner header, 1280x320.
     Deep ink background with a subtle indigo glow; centered lockup + tagline. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 320" fill="none"
     stroke-linecap="round" stroke-linejoin="round">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="320" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0D0D12"/>
      <stop offset="1" stop-color="#15131F"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.42" r="0.62">
      <stop offset="0" stop-color="#4F46E5" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#4F46E5" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- background -->
  <rect x="0" y="0" width="1280" height="320" rx="0" fill="url(#bg)"/>
  <rect x="0" y="0" width="1280" height="320" fill="url(#glow)"/>

  <!-- centered lockup group: mark + wordmark, baseline-aligned, tagline below -->
  <!-- mark, scaled 32 -> 96, indigo, positioned left of the wordmark -->
  <g transform="translate(404,92) scale(3)" stroke="#7C75F0">
    <g stroke-width="2.2">
      <polygon points="16,4.5 25.96,10.25 25.96,21.75 16,27.5 6.04,21.75 6.04,10.25"/>
      <path d="M 18.27 11.545 A 5 5 0 1 1 12.654 12.284" stroke-linecap="butt"/>
      <polygon points="14.735,10.411 13.993,13.771 11.316,10.798" fill="#7C75F0" stroke="none"/>
    </g>
  </g>

  <!-- wordmark, near-white -->
  <text x="528" y="172" fill="#F5F5F7" stroke="none"
        font-family="Inter, ui-sans-serif, system-ui, -apple-system, sans-serif"
        font-size="64" font-weight="600" letter-spacing="-1.4"
        style="font-variant-ligatures:none">agent-sdk</text>

  <!-- tagline, centered under the lockup -->
  <text x="612" y="226" fill="#A9A7B8" stroke="none" text-anchor="middle"
        font-family="Inter, ui-sans-serif, system-ui, -apple-system, sans-serif"
        font-size="24" font-weight="400" letter-spacing="0.2"
        style="font-variant-ligatures:none">Build production AI agents in Rust</text>
</svg>
