<!-- agent-sdk horizontal lockup: indigo mark + near-black wordmark.
     For light backgrounds. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 184 48" fill="none"
     stroke-linecap="round" stroke-linejoin="round">
  <!-- mark, indigo -->
  <g transform="translate(8,6) scale(1.125)" stroke="#4F46E5">
    <g stroke-width="1.96">
      <polygon points="16,4.5 25.96,10.25 25.96,21.75 16,27.5 6.04,21.75 6.04,10.25"/>
      <path d="M 18.27 11.545 A 5 5 0 1 1 12.654 12.284" stroke-linecap="butt"/>
      <polygon points="14.735,10.411 13.993,13.771 11.316,10.798" fill="#4F46E5" stroke="none"/>
    </g>
  </g>
  <!-- wordmark, near-black ink -->
  <text x="56" y="31.5" fill="#0D0D0F" stroke="none"
        font-family="Inter, ui-sans-serif, system-ui, -apple-system, sans-serif"
        font-size="22" font-weight="600" letter-spacing="-0.4"
        style="font-variant-ligatures:none">agent-sdk</text>
</svg>
