<!-- agent-sdk favicon: simplified for the 16px grid.
     The full looped mark mushes into a blob at 16px, so the favicon uses the
     legitimate size-down: a single bold node dot inside a bolder rounded
     hexagon (a node on its loop, distilled). Use the full looped mark at >=24px.
     currentColor so it recolors via CSS; transparent bg. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none" stroke="currentColor" stroke-width="3" stroke-linejoin="round">
  <polygon points="16,4.5 25.96,10.25 25.96,21.75 16,27.5 6.04,21.75 6.04,10.25"/>
  <circle cx="16" cy="16" r="3.6" fill="currentColor" stroke="none"/>
</svg>
